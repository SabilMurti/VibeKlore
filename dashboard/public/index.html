<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeKlore Autopilot Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #090d16 0%, #0f1026 50%, #050510 100%);
      --glass-bg: rgba(255, 255, 255, 0.02);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-hover: rgba(255, 255, 255, 0.06);
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --primary-glow: rgba(99, 102, 241, 0.25);
      --accent: #d946ef;
      --accent-glow: rgba(217, 70, 239, 0.25);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --text: #f8fafc;
      --text-muted: #64748b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-gradient);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Background blobs for premium glowing style */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      z-index: -1;
      pointer-events: none;
      opacity: 0.4;
      animation: float 25s infinite alternate ease-in-out;
    }

    .blob-1 {
      top: -10%;
      left: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--primary-glow) 0%, transparent 80%);
    }

    .blob-2 {
      bottom: -10%;
      right: -10%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 80%);
      animation-delay: -10s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(60px, 40px) scale(1.15); }
      100% { transform: translate(-20px, 80px) scale(0.9); }
    }

    header {
      padding: 1.5rem 3rem;
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(9, 13, 22, 0.4);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(to right, #818cf8, var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    header h1::before {
      content: '';
      display: inline-block;
      width: 10px;
      height: 10px;
      background-color: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--accent);
      animation: pulse-glow 2s infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { transform: scale(1); box-shadow: 0 0 12px var(--accent); }
      50% { transform: scale(1.3); box-shadow: 0 0 20px var(--accent); }
    }

    header .subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.1rem;
      font-weight: 400;
    }

    .main-container {
      max-width: 1400px;
      width: 100%;
      margin: 2rem auto;
      padding: 0 2rem;
      display: grid;
      grid-template-columns: 1.1fr 1.4fr;
      gap: 2rem;
      flex-grow: 1;
    }

    @media (max-width: 1024px) {
      .main-container {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 2rem;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow: 0 15px 45px rgba(0, 0, 0, 0.5);
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 0.8rem;
      color: #818cf8;
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: -0.2px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"], input[type="password"], select, textarea {
      background: rgba(5, 5, 10, 0.5);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 0.8rem 1rem;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
      width: 100%;
    }

    input[type="text"]:focus, input[type="password"]:focus, select:focus, textarea:focus {
      border-color: #818cf8;
      background-color: rgba(5, 5, 10, 0.7);
      box-shadow: 0 0 14px var(--primary-glow);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
    }

    .btn {
      background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0.8rem 1.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      box-shadow: 0 4px 20px var(--primary-glow);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.45);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: var(--glass-hover);
      border: 1px solid var(--glass-border);
      color: #e2e8f0;
      box-shadow: none;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: none;
    }

    .btn-success {
      background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
      box-shadow: 0 4px 20px rgba(16, 185, 129, 0.25);
    }

    .btn-success:hover {
      box-shadow: 0 8px 25px rgba(16, 185, 129, 0.45);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 0.5rem 1rem;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 700;
      gap: 0.5rem;
      letter-spacing: 0.5px;
    }

    .status-idle {
      background: rgba(16, 185, 129, 0.1);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.25);
    }

    .status-running {
      background: rgba(99, 102, 241, 0.1);
      color: #a5b4fc;
      border: 1px solid rgba(99, 102, 241, 0.25);
      animation: pulse 2s infinite;
    }

    .status-fallback {
      background: rgba(245, 158, 11, 0.1);
      color: #fbbf24;
      border: 1px solid rgba(245, 158, 11, 0.25);
    }

    .status-error {
      background: rgba(239, 68, 68, 0.1);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.25);
    }

    .log-container {
      font-family: 'JetBrains Mono', monospace;
      background: rgba(5, 5, 10, 0.85);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1.5rem;
      font-size: 0.85rem;
      line-height: 1.6;
      overflow-y: auto;
      flex-grow: 1;
      height: 480px;
      max-height: 600px;
      white-space: pre-wrap;
      color: #cbd5e1;
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.8);
      position: relative;
    }

    .log-container::-webkit-scrollbar {
      width: 8px;
    }

    .log-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .log-container::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    .log-container::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    @keyframes pulse {
      0% { opacity: 0.7; }
      50% { opacity: 1; }
      100% { opacity: 0.7; }
    }

    footer {
      padding: 2.5rem;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
      border-top: 1px solid var(--glass-border);
      margin-top: auto;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(9, 13, 22, 0.3);
    }

    .spinner {
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top: 2px solid white;
      border-radius: 50%;
      width: 14px;
      height: 14px;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .notification {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: rgba(9, 13, 22, 0.95);
      border: 1px solid var(--glass-border);
      padding: 1.2rem 1.8rem;
      border-radius: 12px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      transform: translateY(150%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .notification.show {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <!-- Ambient background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <header>
    <div>
      <h1>VibeKlore Autopilot</h1>
      <div class="subtitle">AI-Powered Software Engineer Dashboard</div>
    </div>
    <div id="state-badge-container">
      <div class="status-badge status-idle">
        <span style="display:inline-block; width:8px; height:8px; border-radius:50%; background-color:#10b981; box-shadow: 0 0 8px #10b981;"></span>
        IDLE
      </div>
    </div>
  </header>

  <div class="main-container">
    <!-- LEFT CARD: Configurations -->
    <div class="card">
      <div class="card-title">Setelan Autopilot</div>
      
      <!-- Pre-instruction -->
      <div class="form-group">
        <label for="pre-instruction">Pre-Instruction (Target Proyek Berikutnya)</label>
        <textarea id="pre-instruction" rows="3" placeholder="Masukkan ide proyek (contoh: buat website portfolio responsif)"></textarea>
        <button id="btn-save-plan" class="btn btn-secondary" style="align-self: flex-end; padding: 0.5rem 1rem; font-size: 0.85rem; border-radius: 8px;">Simpan Rencana</button>
      </div>

      <!-- Mode & Cron Time -->
      <div class="row">
        <div class="form-group">
          <label for="config-mode">Mode Autopilot</label>
          <select id="config-mode">
            <option value="new">Proyek Baru (New)</option>
            <option value="maintenance">Pemeliharaan (Maintenance)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="config-cron">Waktu Cron Harian</label>
          <input type="text" id="config-cron" placeholder="07:05">
        </div>
      </div>

      <!-- Whitelist Paths -->
      <div class="form-group">
        <label for="config-whitelist">Whitelist Paths (Maintenance Mode)</label>
        <textarea id="config-whitelist" rows="3" placeholder="/home/murtix/Projects/VibeKlore"></textarea>
      </div>

      <!-- Provider (Base URL) & API Key -->
      <div class="row">
        <div class="form-group">
          <label for="config-api-base">API Base URL (Provider)</label>
          <input type="text" id="config-api-base" placeholder="https://api.cometapi.com/v1">
        </div>
        <div class="form-group">
          <label for="config-api-key">API Key</label>
          <div style="position: relative; display: flex; align-items: center; width: 100%;">
            <input type="password" id="config-api-key" placeholder="sk-..." style="padding-right: 2.5rem; width: 100%;">
            <button type="button" id="btn-toggle-key" style="position: absolute; right: 10px; background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; outline: none; padding: 0.2rem; display: flex; align-items: center; justify-content: center; transition: color 0.2s ease;">👁️</button>
          </div>
        </div>
      </div>

      <!-- Webhook Discord -->
      <div class="form-group">
        <label for="config-webhook">Discord Webhook URL</label>
        <input type="text" id="config-webhook" placeholder="https://discord.com/api/webhooks/...">
      </div>

      <!-- Action buttons -->
      <div style="display: flex; gap: 1rem; margin-top: 1rem;">
        <button id="btn-save-config" class="btn btn-secondary" style="flex: 1;">Simpan Setelan</button>
        <button id="btn-run" class="btn btn-success" style="flex: 1.2;">
          🚀 Jalankan Autopilot
        </button>
      </div>
    </div>

    <!-- RIGHT CARD: Active Monitor & Logs -->
    <div class="card" style="display: flex; flex-direction: column;">
      <div class="card-title">
        Monitor Aktivitas Live
        <button id="btn-clear-logs" class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.8rem; border-radius: 8px;">Clear Screen</button>
      </div>

      <div class="form-group" style="flex-grow: 1; display: flex; flex-direction: column;">
        <label>Console Logs (Auto-scroll)</label>
        <div id="log-monitor" class="log-container">=== Memuat log aktivitas... ===</div>
      </div>
    </div>
  </div>

  <div id="toast" class="notification">
    <span id="toast-text">Pemberitahuan berhasil!</span>
  </div>

  <footer>
    VibeKlore Autopilot © 2026. Made with Google Antigravity.
  </footer>

  <script>
    const elState = document.getElementById('state-badge-container');
    const elPreInstruction = document.getElementById('pre-instruction');
    const elMode = document.getElementById('config-mode');
    const elCron = document.getElementById('config-cron');
    const elWhitelist = document.getElementById('config-whitelist');
    const elWebhook = document.getElementById('config-webhook');
    const elLog = document.getElementById('log-monitor');
    const elApiBase = document.getElementById('config-api-base');
    const elApiKey = document.getElementById('config-api-key');
    const btnToggleKey = document.getElementById('btn-toggle-key');
    
    const btnSavePlan = document.getElementById('btn-save-plan');
    const btnSaveConfig = document.getElementById('btn-save-config');
    const btnRun = document.getElementById('btn-run');
    const btnClearLogs = document.getElementById('btn-clear-logs');
    
    const elToast = document.getElementById('toast');
    const elToastText = document.getElementById('toast-text');

    let currentConfig = {};
    let isRunning = false;

    function showToast(text, isError = false) {
      elToastText.textContent = text;
      elToast.style.borderColor = isError ? 'var(--danger)' : 'var(--glass-border)';
      elToast.classList.add('show');
      setTimeout(() => {
        elToast.classList.remove('show');
      }, 3000);
    }

    // Toggle API Key view mode (Show/Hide password)
    btnToggleKey.addEventListener('click', () => {
      if (elApiKey.type === 'password') {
        elApiKey.type = 'text';
        btnToggleKey.textContent = '🙈';
      } else {
        elApiKey.type = 'password';
        btnToggleKey.textContent = '👁️';
      }
    });

    // Load configs
    async function loadConfig() {
      try {
        const res = await fetch('/api/config');
        const data = await res.json();
        currentConfig = data;
        
        elMode.value = data.mode || 'new';
        elCron.value = data.cron_time || '07:05';
        elWhitelist.value = (data.allow_maintenance || []).join('\n');
        elWebhook.value = data.discord_webhook_url || '';
        elApiBase.value = data.comet_api_base || '';
        elApiKey.value = data.comet_api_key || '';
      } catch (e) {
        showToast('Gagal memuat konfigurasi: ' + e.message, true);
      }
    }

    // Load status
    async function loadStatus() {
      try {
        const res = await fetch('/api/state');
        const data = await res.json();
        
        let badgeHtml = '';
        if (data.state === 'RUNNING') {
          isRunning = true;
          btnRun.disabled = true;
          btnRun.innerHTML = `<span class="spinner"></span> Berjalan...`;
          badgeHtml = `
            <div class="status-badge status-running">
              <span class="spinner" style="border-width:1.5px; width:8px; height:8px; display:inline-block;"></span>
              RUNNING
            </div>
          `;
        } else if (data.state === 'FALLBACK_LOCAL') {
          isRunning = false;
          btnRun.disabled = false;
          btnRun.innerHTML = `🚀 Jalankan Autopilot`;
          badgeHtml = `
            <div class="status-badge status-fallback">
              <span style="display:inline-block; width:8px; height:8px; border-radius:50%; background-color:#f59e0b; box-shadow: 0 0 8px #f59e0b;"></span>
              FALLBACK LOCAL
            </div>
          `;
        } else if (data.state === 'TESTS_FAILED') {
          isRunning = false;
          btnRun.disabled = false;
          btnRun.innerHTML = `🚀 Jalankan Autopilot`;
          badgeHtml = `
            <div class="status-badge status-error">
              <span style="display:inline-block; width:8px; height:8px; border-radius:50%; background-color:#ef4444; box-shadow: 0 0 8px #ef4444;"></span>
              TESTS FAILED
            </div>
          `;
        } else {
          isRunning = false;
          btnRun.disabled = false;
          btnRun.innerHTML = `🚀 Jalankan Autopilot`;
          badgeHtml = `
            <div class="status-badge status-idle">
              <span style="display:inline-block; width:8px; height:8px; border-radius:50%; background-color:#10b981; box-shadow: 0 0 8px #10b981;"></span>
              IDLE
            </div>
          `;
        }
        elState.innerHTML = badgeHtml;
      } catch (e) {
        console.error('Gagal memuat status:', e);
      }
    }

    // Colorize logs dynamically with CSS colors
    function colorizeLogs(text) {
      if (!text) return '';
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/(\[Orchestrator\])/g, '<span style="color:#a5b4fc; font-weight:bold;">$1</span>')
        .replace(/(\[Harvester\])/g, '<span style="color:#f472b6; font-weight:bold;">$1</span>')
        .replace(/(✅|SUKSES|sukses|successfully|success)/gi, '<span style="color:#34d399; font-weight:bold;">$1</span>')
        .replace(/(❌|GAGAL|gagal|failed|error)/gi, '<span style="color:#f87171; font-weight:bold;">$1</span>')
        .replace(/(⚠️|WARNING|warning|limit)/gi, '<span style="color:#fbbf24; font-weight:bold;">$1</span>');
    }

    // Fetch logs
    async function loadLogs() {
      try {
        const res = await fetch('/api/logs');
        const data = await res.json();
        const shouldScroll = elLog.scrollTop + elLog.clientHeight >= elLog.scrollHeight - 50;
        
        elLog.innerHTML = colorizeLogs(data.logs);
        
        if (shouldScroll || isRunning) {
          elLog.scrollTop = elLog.scrollHeight;
        }
      } catch (e) {
        console.error('Gagal mengambil logs:', e);
      }
    }

    // Save pre-instruction plan
    btnSavePlan.addEventListener('click', async () => {
      const val = elPreInstruction.value.trim();
      if (!val) {
        showToast('Masukkan instruksi rencana proyek.', true);
        return;
      }
      
      try {
        const res = await fetch('/api/plan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ instruction: val })
        });
        const data = await res.json();
        if (res.ok) {
          showToast('✅ Rencana proyek berhasil disimpan!');
        } else {
          showToast('Error: ' + data.error, true);
        }
      } catch (e) {
        showToast('Gagal menyimpan rencana: ' + e.message, true);
      }
    });

    // Save configurations
    btnSaveConfig.addEventListener('click', async () => {
      const mode = elMode.value;
      const cronTime = elCron.value.trim();
      const whitelist = elWhitelist.value.split('\n').map(p => p.trim()).filter(p => p);
      const webhook = elWebhook.value.trim();
      const apiBase = elApiBase.value.trim();
      const apiKey = elApiKey.value.trim();
      
      if (!cronTime.match(/^\d{1,2}:\d{2}$/)) {
        showToast('Format waktu cron harian tidak valid (HH:MM).', true);
        return;
      }

      currentConfig.mode = mode;
      currentConfig.cron_time = cronTime;
      currentConfig.allow_maintenance = whitelist;
      currentConfig.discord_webhook_url = webhook;
      currentConfig.comet_api_base = apiBase;
      currentConfig.comet_api_key = apiKey;

      try {
        const res = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(currentConfig)
        });
        const data = await res.json();
        
        if (res.ok) {
          showToast('✅ Konfigurasi & Jadwal Cron berhasil disimpan!');
        } else {
          showToast('Gagal menyimpan konfigurasi: ' + (data.error || 'Server error'), true);
        }
      } catch (e) {
        showToast('Error: ' + e.message, true);
      }
    });

    // Trigger run autopilot
    btnRun.addEventListener('click', async () => {
      if (isRunning) return;
      
      try {
        const res = await fetch('/api/run', { method: 'POST' });
        const data = await res.json();
        if (res.ok) {
          showToast('🚀 Autopilot berhasil dijalankan di latar belakang!');
          loadStatus();
        } else {
          showToast('Gagal: ' + data.error, true);
        }
      } catch (e) {
        showToast('Error: ' + e.message, true);
      }
    });

    // Clear logs screen
    btnClearLogs.addEventListener('click', () => {
      elLog.textContent = '=== Layar log dibersihkan ===';
    });

    // Initial page load
    loadConfig();
    loadStatus();
    loadLogs();

    // Intervals
    setInterval(() => {
      loadStatus();
      loadLogs();
    }, 2000);
  </script>
</body>
</html>
